<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments — Drafts</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --card: #ffffff; --card-hover: #f1f5f9;
      --border: #e2e8f0; --primary: #2563eb; --primary-glow: rgba(37,99,235,.1);
      --accent: #059669; --accent-glow: rgba(5,150,105,.1);
      --warning: #d97706; --danger: #dc2626;
      --text: #1e293b; --text-secondary: #475569; --text-muted: #64748b;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,.08); --shadow-hover: 0 8px 32px rgba(0,0,0,.12);
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    
    .header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 88px;
      background: rgba(255,255,255,.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }
    .logo { display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none; }
    .logo-img { height: 64px; width: auto; object-fit: contain; }
    .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: -.3px; color: var(--text); }
    .logo-subtitle { font-size: .65rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: -4px; }
    .nav { display: flex; gap: 4px; }
    .nav-btn {
      position: relative; padding: 10px 18px; border: none; background: transparent;
      color: var(--text-secondary); font-size: .88rem; font-weight: 500;
      border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
    }
    .nav-btn:hover { background: var(--primary-glow); color: var(--primary); }
    .nav-btn.active { background: var(--primary-glow); color: var(--primary); font-weight: 600; }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: -1px; left: 50%;
      transform: translateX(-50%); width: 60%; height: 2px;
      background: var(--primary); border-radius: 1px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px rgba(5,150,105,.4); }
    .status-text { font-size: .75rem; color: var(--accent); font-weight: 600; }
    
    .main { padding: 2rem; max-width: 1440px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
    .page-desc { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }
    
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-size: .85rem; font-weight: 600; cursor: pointer; transition: var(--transition); pointer-events: auto; }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,.2); }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
    .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; letter-spacing: .3px; }
    .badge-green { background: var(--accent-glow); color: var(--accent); }
    .badge-yellow { background: rgba(217,119,6,.12); color: var(--warning); }
    .badge-red { background: rgba(220,38,38,.12); color: var(--danger); }
    .badge-blue { background: var(--primary-glow); color: var(--primary); }
    .badge-gray { background: rgba(100,116,139,.12); color: var(--text-muted); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    
    .price-main { font-weight: 700; font-size: .88rem; color: var(--text); }
    .price-sub { font-size: .7rem; color: var(--text-muted); margin-left: 4px; }
    
    .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead { background: var(--card-hover); }
    th { text-align: left; padding: 12px 16px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: .72rem; letter-spacing: .8px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: var(--transition); cursor: default; }
    tbody tr:hover { background: var(--card-hover); }
    
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: .75rem; opacity: .4; }
    
    .tabs { display: flex; gap: 2px; background: var(--card); padding: 4px; border-radius: var(--radius-sm); margin-bottom: 1.25rem; width: fit-content; border: 1px solid var(--border); }
    .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-size: .8rem; font-weight: 500; border-radius: 6px; cursor: pointer; transition: var(--transition); }
    .tab-btn:hover { color: var(--text); background: var(--card-hover); }
    .tab-btn.active { background: var(--primary); color: #fff; }
    
    .toast-container { position: fixed; top: 100px; right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 16px; font-size: .82rem; box-shadow: var(--shadow-hover); animation: slideIn .3s ease; max-width: 320px; color: var(--text); }
    .toast.success { border-left-color: var(--accent); }
    .toast.error { border-left-color: var(--danger); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 200; place-items: center; pointer-events: none; opacity: 0; transition: opacity .2s ease; }
    .modal-overlay.open { display: grid; pointer-events: auto; opacity: 1; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 90%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-hover); animation: fadeUp .2s ease; pointer-events: auto; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
    .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .modal-close { width: 32px; height: 32px; display: grid; place-items: center; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 6px; font-size: 1.2rem; transition: var(--transition); }
    .modal-close:hover { background: var(--card-hover); color: var(--text); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--surface); }
    
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: .78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: .85rem; font-family: inherit; transition: var(--transition); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    
    .text-green { color: var(--accent); }
    .text-yellow { color: var(--warning); }
    .text-red { color: var(--danger); }
    .text-blue { color: var(--primary); }
    .text-muted { color: var(--text-muted); }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: .5rem; }
    .wrap { flex-wrap: wrap; }
    
    @media (max-width: 1024px) {
      .header { padding: 0 1rem; height: 80px; }
      .logo-img { height: 52px; }
      .nav { gap: 0; flex-wrap: wrap; }
      .nav-btn { padding: 8px 12px; font-size: .78rem; }
      .logo-text { font-size: 1.2rem; }
      .logo-subtitle { display: none; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" id="logoBtn">
    <img src="https://i.ibb.co/p6GCfY1x/Screenshot-2026-05-30-at-17-06-41.png" alt="Drafts Dashboard Logo" class="logo-img" loading="lazy">
  </div>
  <nav class="nav">
    <a href="index.html" class="nav-btn">Dashboard</a>
    <a href="projects.html" class="nav-btn">Projects</a>
    <a href="payments.html" class="nav-btn active">Payments</a>
    <a href="clients.html" class="nav-btn">Clients</a>
    <a href="reports.html" class="nav-btn">Reports</a>
    <a href="performance.html" class="nav-btn">Performance</a>
    <a href="finance.html" class="nav-btn">Finance</a>
  </nav>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-text">Online</span>
  </div>
</header>

<div class="toast-container" id="toastContainer"></div>

<main class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Payment Records</h1>
      <p class="page-desc">Complete payment history and transaction log</p>
    </div>
    <div class="flex gap-1 wrap">
      <select class="form-select" style="width:auto" id="paymentFilter">
        <option value="all">All Projects</option>
      </select>
      <button class="btn btn-primary" id="newPaymentBtn">＋ Record Payment</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all-payments">All</button>
    <button class="tab-btn" data-tab="paid-payments">Paid</button>
    <button class="tab-btn" data-tab="pending-payments">Pending</button>
    <button class="tab-btn" data-tab="overdue-payments">Overdue</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Project</th>
          <th>Period</th>
          <th>Due Date</th>
          <th>Amount (UGX)</th>
          <th>Amount (USD)</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="paymentsTable">
        <tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💳</div><p>Loading payments...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Payment Modal (Schema Compliant + Editable) -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Record Payment</h3>
      <button class="modal-close" id="closePaymentModal">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="payId" /> <!-- Tracks if we are editing -->
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client *</label>
          <select class="form-select" id="payClient">
            <option value="">Select a client...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Project *</label>
          <select class="form-select" id="payProject" disabled>
            <option value="">Select client first...</option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Period Name</label>
          <input class="form-input" id="payPeriod" placeholder="e.g. Month 1" />
        </div>
        <div class="form-group">
          <label class="form-label">Period Number</label>
          <input class="form-input" id="payPeriodNum" type="number" min="1" value="1" />
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount (UGX) *</label>
          <input class="form-input" id="payAmount" type="number" placeholder="500,000" />
        </div>
        <div class="form-group">
          <label class="form-label">Payment Date</label>
          <input class="form-input" id="payPaymentDate" type="date" />
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input class="form-input" id="payDueDate" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="payStatus">
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="overdue">Overdue</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="payNotes" placeholder="Payment reference, method, etc..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelPayment">Cancel</button>
      <button class="btn btn-primary" id="savePayment">Record Payment</button>
    </div>
  </div>
</div>

<script>
  (function() {
    'use strict';
    
    const SUPABASE_URL = 'https://hnbzerhoqqsmzqxcbnxv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuYnplcmhvcXFzbXpxeGNibnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg1MjksImV4cCI6MjA5NDYyNDUyOX0.a4rM51DQGih9SXMr71PREngZ_pT6dJFgv_fG9j5jAGc';
    const USD_RATE = 0.00027;

    document.addEventListener('DOMContentLoaded', async function() {
      if (!window.supabase) {
        showToast('Database SDK failed to load', 'error');
        return;
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let isSaving = false;
      let allProjects = []; 

      // === UTILS ===
      function getLocalDateString(date = new Date()) {
        const offset = date.getTimezoneOffset();
        return new Date(date.getTime() - offset * 60000).toISOString().split('T')[0];
      }

      function generateId() {
        if (crypto?.randomUUID) return crypto.randomUUID();
        return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      }
      function formatUGX(n) { if (!n) return 'UGX 0'; return 'UGX ' + Number(n).toLocaleString(); }
      function formatUSD(n) { if (!n) return '$0.00'; return '$' + (n * USD_RATE).toFixed(2); }
      
      function showToast(msg, type = 'success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }
      function openModal(id) { document.getElementById(id).classList.add('open'); }
      function closeModal(id) { document.getElementById(id).classList.remove('open'); }

      function filterPaymentTab(tab) {
        const rows = document.querySelectorAll('#paymentsTable tr[data-status]');
        rows.forEach(row => {
          const status = row.dataset.status;
          if (tab === 'all-payments') { row.style.display = ''; return; }
          const statusMap = { 'paid-payments': 'paid', 'pending-payments': 'pending', 'overdue-payments': 'overdue' };
          const target = statusMap[tab];
          row.style.display = status === target ? '' : 'none';
        });
      }

      async function loadClientsDropdown() {
        try {
          const { data: projects, error } = await supabase.from('projects').select('client').not('client', 'is', null);
          if (error) throw error;
          const clients = [...new Set((projects || []).map(p => p.client).filter(c => c && c.trim()))].sort();
          const sel = document.getElementById('payClient');
          sel.innerHTML = '<option value="">Select a client...</option>' + 
            clients.map(c => `<option value="${c}">${c}</option>`).join('');
        } catch (err) {
          console.error('Failed to load clients:', err);
        }
      }

      async function loadClientProjects(clientName) {
        const projSelect = document.getElementById('payProject');
        if (!clientName) {
          projSelect.innerHTML = '<option value="">Select client first...</option>';
          projSelect.disabled = true;
          return;
        }
        
        try {
          const { data, error } = await supabase.from('projects')
            .select('id, name, monthly_rate, start_date')
            .eq('client', clientName)
            .order('name');
          
          if (error) throw error;
          allProjects = data || [];
          
          if (!allProjects.length) {
            projSelect.innerHTML = '<option value="">No projects for this client</option>';
            projSelect.disabled = true;
            return;
          }
          
          projSelect.innerHTML = '<option value="">Select a project...</option>' + 
            allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
          projSelect.disabled = false;
          
        } catch (err) {
          console.error('Failed to load projects:', err);
        }
      }

      async function onProjectSelect(projectId) {
        // Don't auto-fill if we are editing an existing payment
        if (document.getElementById('payId').value) return;

        const project = allProjects.find(p => p.id === projectId);
        if (!project) return;
        
        try {
          const { data: pays } = await supabase.from('payments')
            .select('period_number, due_date')
            .eq('project_id', projectId)
            .order('period_number', { ascending: false })
            .limit(1);
            
          const lastPay = pays && pays.length > 0 ? pays[0] : null;
          
          const nextPeriodNum = lastPay ? (lastPay.period_number || 0) + 1 : 1;
          document.getElementById('payPeriodNum').value = nextPeriodNum;
          document.getElementById('payPeriod').value = `Month ${nextPeriodNum}`;
          
          let nextDueDate = getLocalDateString();
          if (lastPay && lastPay.due_date) {
            const d = new Date(lastPay.due_date + 'T00:00:00');
            d.setMonth(d.getMonth() + 1);
            nextDueDate = getLocalDateString(d);
          } else if (project.start_date) {
            const d = new Date(project.start_date + 'T00:00:00');
            d.setMonth(d.getMonth() + 1);
            nextDueDate = getLocalDateString(d);
          }
          document.getElementById('payDueDate').value = nextDueDate;
          document.getElementById('payAmount').value = project.monthly_rate || 0;
          
        } catch (err) {
          console.error('Error auto-filling:', err);
        }
      }

      async function loadPayments() {
        try {
          const filter = document.getElementById('paymentFilter').value;
          let query = supabase.from('payments').select('*').order('payment_date', { ascending: false });
          if (filter !== 'all') query = query.eq('project_id', filter);
          
          const { data: payments, error } = await query;
          const tbody = document.getElementById('paymentsTable');
          
          if (error) {
            tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load</p></div></td></tr>`;
            return;
          }
          
          try {
            const { data: projects } = await supabase.from('projects').select('id, name');
            const sel = document.getElementById('paymentFilter');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="all">All Projects</option>' + 
              (projects || []).map(p => `<option value="${p.id}" ${currentVal === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
          } catch (e) { }

          const { data: projects } = await supabase.from('projects').select('id, name, client');
          const pMap = {};
          (projects || []).forEach(p => { pMap[p.id] = p; });

          if (!payments || payments.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💳</div><p>No payment records found.</p></div></td></tr>`;
            return;
          }
          
          tbody.innerHTML = payments.map(p => {
            const proj = pMap[p.project_id] || {};
            const statusBadge = p.status === 'paid' ? 'badge-green' : p.status === 'pending' ? 'badge-yellow' : 'badge-red';
            return `<tr data-status="${p.status}">
              <td>${new Date(p.payment_date).toLocaleDateString()}</td>
              <td><strong>${proj.name || 'Unknown'}</strong><br><span class="text-muted" style="font-size:.75rem">${proj.client || ''}</span></td>
              <td style="font-size:.82rem">${p.period || '—'} <span class="text-muted">(Period ${p.period_number || 1})</span></td>
              <td style="font-size:.82rem">${p.due_date ? new Date(p.due_date).toLocaleDateString() : '—'}</td>
              <td><strong>${formatUGX(p.amount)}</strong></td>
              <td><strong style="font-size:.82rem">${formatUSD(p.amount)}</strong></td>
              <td><span class="badge ${statusBadge}"><span class="badge-dot"></span>${p.status}</span></td>
              <td class="flex gap-1">
                <button class="btn btn-sm btn-outline edit-btn" data-id="${p.id}">Edit</button>
                <button class="btn btn-sm btn-outline text-red delete-btn" data-id="${p.id}">Delete</button>
              </td>
            </tr>`;
          }).join('');
          
        } catch (err) {
          console.error('Payments load error:', err);
          showToast('Failed to load payments', 'error');
        }
      }

      // 🚀 NEW: EDIT PAYMENT FUNCTION
      async function editPayment(id) {
        try {
          const { data: payment, error } = await supabase.from('payments').select('*').eq('id', id).single();
          if (error || !payment) {
            showToast('Payment not found', 'error');
            return;
          }

          // Fetch project to get the client name
          const { data: project } = await supabase.from('projects').select('client').eq('id', payment.project_id).single();
          const clientName = project?.client || '';

          // Open modal and set to "Edit" mode
          openModal('paymentModal');
          document.getElementById('modalTitle').textContent = 'Edit Payment';
          document.getElementById('savePayment').textContent = 'Update Payment';
          document.getElementById('payId').value = payment.id;

          // Load dropdowns and set values
          await loadClientsDropdown();
          document.getElementById('payClient').value = clientName;
          
          await loadClientProjects(clientName);
          document.getElementById('payProject').value = payment.project_id;

          // Fill in the rest of the details
          document.getElementById('payPeriod').value = payment.period || '';
          document.getElementById('payPeriodNum').value = payment.period_number || 1;
          document.getElementById('payAmount').value = payment.amount || 0;
          document.getElementById('payPaymentDate').value = payment.payment_date || '';
          document.getElementById('payDueDate').value = payment.due_date || '';
          document.getElementById('payStatus').value = payment.status || 'paid';
          document.getElementById('payNotes').value = payment.notes || '';

        } catch (err) {
          console.error('Edit error:', err);
          showToast('Failed to load payment: ' + err.message, 'error');
        }
      }

      async function deletePayment(id) {
        if (!confirm('Delete this payment record? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('payments').delete().eq('id', id);
          if (error) throw error;
          showToast('Payment deleted');
          await loadPayments();
        } catch (err) {
          showToast('Failed to delete: ' + err.message, 'error');
        }
      }

      document.getElementById('logoBtn').addEventListener('click', () => window.location.href = 'index.html');
      document.getElementById('newPaymentBtn').addEventListener('click', async () => {
        resetPaymentForm(); // Ensure clean state
        await loadClientsDropdown();
        openModal('paymentModal');
        document.getElementById('payClient').focus();
      });
      document.getElementById('closePaymentModal').addEventListener('click', () => {
        closeModal('paymentModal');
        resetPaymentForm();
      });
      document.getElementById('cancelPayment').addEventListener('click', () => {
        closeModal('paymentModal');
        resetPaymentForm();
      });
      document.getElementById('paymentFilter').addEventListener('change', loadPayments);
      
      document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.classList.remove('open');
            resetPaymentForm();
          }
        });
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          filterPaymentTab(this.dataset.tab);
        });
      });

      // Handle Edit and Delete clicks
      document.getElementById('paymentsTable').addEventListener('click', (e) => {
        const editBtn = e.target.closest('.edit-btn');
        if (editBtn) {
          editPayment(editBtn.dataset.id);
          return;
        }
        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) deletePayment(deleteBtn.dataset.id);
      });

      document.getElementById('payClient').addEventListener('change', function() {
        loadClientProjects(this.value);
      });

      document.getElementById('payProject').addEventListener('change', function() {
        onProjectSelect(this.value);
      });

      function resetPaymentForm() {
        document.getElementById('payId').value = ''; // Clear edit ID
        document.getElementById('modalTitle').textContent = 'Record Payment';
        document.getElementById('savePayment').textContent = 'Record Payment';
        document.getElementById('payClient').value = '';
        document.getElementById('payProject').innerHTML = '<option value="">Select client first...</option>';
        document.getElementById('payProject').disabled = true;
        document.getElementById('payPeriod').value = '';
        document.getElementById('payPeriodNum').value = 1;
        document.getElementById('payAmount').value = '';
        document.getElementById('payPaymentDate').value = getLocalDateString();
        document.getElementById('payDueDate').value = '';
        document.getElementById('payStatus').value = 'paid';
        document.getElementById('payNotes').value = '';
        allProjects = [];
      }

      // 🚀 UPDATED: SAVE/UPDATE PAYMENT
      document.getElementById('savePayment').addEventListener('click', async function() {
        if (isSaving) return;
        isSaving = true;
        const btn = this;
        const originalText = btn.textContent;
        
        const payId = document.getElementById('payId').value;
        const isEdit = !!payId;
        
        btn.textContent = isEdit ? 'Updating...' : 'Recording...';
        btn.disabled = true;

        try {
          const projectId = document.getElementById('payProject').value;
          if (!projectId) throw new Error('Please select a project');
          
          const paymentData = {
            project_id: projectId,
            period: document.getElementById('payPeriod').value.trim(),
            period_number: parseInt(document.getElementById('payPeriodNum').value) || 1,
            amount: parseInt(document.getElementById('payAmount').value) || 0,
            payment_date: document.getElementById('payPaymentDate').value,
            due_date: document.getElementById('payDueDate').value,
            status: document.getElementById('payStatus').value,
            notes: document.getElementById('payNotes').value.trim()
          };
          
          if (!paymentData.amount || paymentData.amount <= 0) throw new Error('Invalid amount');
          if (!paymentData.due_date) throw new Error('Due date is required');
          
          let error;
          if (isEdit) {
            // Update existing record (preserves created_at)
            const { error: updateErr } = await supabase.from('payments').update(paymentData).eq('id', payId);
            error = updateErr;
          } else {
            // Insert new record
            paymentData.id = generateId();
            paymentData.created_at = new Date().toISOString();
            const { error: insertErr } = await supabase.from('payments').insert(paymentData);
            error = insertErr;
          }
          
          if (error) throw new Error(error.message);
          
          showToast(isEdit ? 'Payment updated successfully!' : 'Payment recorded successfully!');
          closeModal('paymentModal');
          resetPaymentForm();
          await loadPayments();
          
        } catch (err) {
          showToast('Error: ' + err.message, 'error');
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
          isSaving = false;
        }
      });

      document.getElementById('payPaymentDate').value = getLocalDateString();
      await loadPayments();
    });
  })();
</script>
</body>
</html>
