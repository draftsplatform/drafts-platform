<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Drafts</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg:#f8fafc; --surface:#fff; --card:#fff; --border:#e2e8f0; --primary:#2563eb; --accent:#059669; --warning:#d97706; --danger:#dc2626; --text:#1e293b; --text-muted:#64748b; --radius:12px; --radius-sm:8px; }
    * { margin:0; padding:0; box-sizing:border-box; } body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
    .header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:88px; background:rgba(255,255,255,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .logo { display:flex; align-items:center; gap:16px; cursor:pointer; } .logo-img { height:64px; width:auto; } .logo-text { font-size:1.6rem; font-weight:800; color:var(--text); }
    .nav { display:flex; gap:4px; } .nav-btn { position:relative; padding:10px 18px; border:none; background:transparent; color:var(--text-muted); font-size:.88rem; font-weight:500; border-radius:8px; cursor:pointer; } .nav-btn.active { background:rgba(37,99,235,.1); color:var(--primary); font-weight:600; }
    .main { padding:2rem; max-width:1440px; margin:0 auto; } .page-title { font-size:1.5rem; font-weight:700; margin-bottom:1.5rem; }
    .grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); } .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.05); } .card-t { font-size:.75rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px; } .card-v { font-size:1.8rem; font-weight:800; } .card-s { font-size:.78rem; color:var(--text-muted); margin-top:4px; }
    .chart { height:200px; display:flex; align-items:flex-end; gap:6px; padding:1rem 0; border-bottom:1px solid var(--border); } .bar { flex:1; background:linear-gradient(to top,var(--primary),rgba(37,99,235,.3)); border-radius:4px 4px 0 0; transition:height .6s ease; position:relative; } .bar:hover::after { content:attr(title); position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:4px 8px; border-radius:4px; font-size:.7rem; white-space:nowrap; margin-bottom:4px; }
    .timeline { padding-left:20px; border-left:2px solid var(--border); } .tl-item { position:relative; padding-bottom:1.25rem; } .tl-dot { position:absolute; left:-26px; top:4px; width:14px; height:14px; border-radius:50%; border:2px solid var(--primary); background:#fff; } .tl-t { font-weight:600; font-size:.85rem; } .tl-d { font-size:.78rem; color:var(--text-muted); margin-top:2px; } .badge { display:inline-flex; padding:4px 8px; border-radius:20px; font-size:.72rem; font-weight:600; } .badge-green { background:rgba(5,150,105,.12); color:var(--accent); } .badge-blue { background:rgba(37,99,235,.1); color:var(--primary); }
    @media(max-width:1024px){.grid{grid-template-columns:1fr 1fr;}.header{padding:0 1rem;height:80px;}}
  </style>
</head>
<body>
<header class="header">
  <div class="logo" id="logoBtn"><img src="https://i.ibb.co/p6GCfY1x/Screenshot-2026-05-30-at-17-06-41.png" alt="Logo" class="logo-img"><div class="logo-text">Drafts</div></div>
  <nav class="nav">
    <a href="index.html" class="nav-btn active">Dashboard</a>
    <a href="projects.html" class="nav-btn">Projects</a>
    <a href="payments.html" class="nav-btn">Payments</a>
    <a href="clients.html" class="nav-btn">Clients</a>
    <a href="reports.html" class="nav-btn">Reports</a>
    <a href="performance.html" class="nav-btn">Performance</a>
    <a href="finance.html" class="nav-btn">Finance</a>
    <a href="employees.html" class="nav-btn">Employees</a>
  </nav>
</header>
<main class="main">
  <h1 class="page-title">Dashboard</h1>
  <div class="grid">
    <div class="card"><div class="card-t">Active Projects</div><div class="card-v" id="dashProj">0</div><div class="card-s">Currently tracked</div></div>
    <div class="card"><div class="card-t">Revenue Collected</div><div class="card-v" id="dashRev" style="color:var(--accent)">UGX 0</div><div class="card-s">All-time</div></div>
    <div class="card"><div class="card-t">Commission Payouts</div><div class="card-v" id="dashComm">UGX 0</div><div class="card-s">Paid to employees</div></div>
    <div class="card"><div class="card-t">Top Referrer</div><div class="card-v" id="dashTop" style="color:var(--primary)">—</div><div class="card-s" id="dashTopProj">0 projects</div></div>
  </div>
  <div style="display:grid; grid-template-columns:2fr 1fr; gap:1rem; margin-top:1.5rem;">
    <div class="card"><div class="card-t">Monthly Revenue</div><div class="chart" id="chart"></div></div>
    <div class="card"><div class="card-t">Recent Activity</div><div class="timeline" id="timeline"></div></div>
  </div>
</main>
<script>
(function(){
  const SUPABASE_URL = 'https://hnbzerhoqqsmzqxcbnxv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuYnplcmhvcXFzbXpxeGNibnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg1MjksImV4cCI6MjA5NDYyNDUyOX0.a4rM51DQGih9SXMr71PREngZ_pT6dJFgv_fG9j5jAGc';
  document.addEventListener('DOMContentLoaded', async () => {
    if(!window.supabase) return;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('logoBtn').onclick = () => location.reload();

    const { data: projs } = await supabase.from('projects').select('*');
    const { data: pays } = await supabase.from('payments').select('*');
    const active = projs?.filter(p=>p.status==='active')||[];
    document.getElementById('dashProj').textContent = active.length;
    
    const paidAmt = pays?.filter(p=>p.status==='paid').reduce((s,p)=>s+(p.amount||0),0)||0;
    document.getElementById('dashRev').textContent = 'UGX ' + paidAmt.toLocaleString();

    // Employee commissions
    const { data: comms } = await supabase.from('employee_earnings').select('*').eq('type','commission').eq('status','paid');
    const commTotal = comms?.reduce((s,c)=>s+(c.amount||0),0)||0;
    document.getElementById('dashComm').textContent = 'UGX ' + commTotal.toLocaleString();

    // Top referrer
    const empMap = {};
    comms?.forEach(c => { empMap[c.employee_id] = (empMap[c.employee_id]||0) + c.amount; });
    const topEmp = Object.keys(empMap).sort((a,b)=>empMap[b]-empMap[a])[0];
    if(topEmp) {
      const { data: emp } = await supabase.from('employees').select('name').eq('id',topEmp).single();
      document.getElementById('dashTop').textContent = emp?.name || '—';
      document.getElementById('dashTopProj').textContent = commTotal > 0 ? `${Math.round(commTotal/10000)}k avg/project` : '';
    }

    // Chart
    const months = new Array(12).fill(0);
    pays?.filter(p=>p.status==='paid').forEach(p => months[new Date(p.payment_date).getMonth()] += p.amount||0);
    const max = Math.max(...months,1);
    const chart = document.getElementById('chart');
    chart.innerHTML = months.map((v,i) => `<div class="bar" style="height:${Math.max(4,(v/max)*180)}px" title="Month ${i+1}: UGX ${v.toLocaleString()}"></div>`).join('');

    // Timeline
    const tl = document.getElementById('timeline');
    const recent = pays?.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
    if(!recent?.length) tl.innerHTML = '<div class="empty">No activity</div>';
    else tl.innerHTML = recent.map(p => `<div class="tl-item"><div class="tl-dot" style="border-color:${p.status==='paid'?'var(--accent)':'var(--warning)'}"></div><div class="tl-t">UGX ${(p.amount||0).toLocaleString()} ${p.status}</div><div class="tl-d">${new Date(p.payment_date).toLocaleDateString()}</div></div>`).join('');
  });
})();
</script>
</body>
</html>
