<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — Drafts</title>
  
  <!-- Google Fonts & Chart.js -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <!-- Supabase JS (v2) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --card: #ffffff; --card-hover: #f1f5f9;
      --border: #e2e8f0; --primary: #2563eb; --primary-glow: rgba(37,99,235,.1);
      --accent: #059669; --accent-glow: rgba(5,150,105,.1);
      --warning: #d97706; --danger: #dc2626;
      --text: #1e293b; --text-secondary: #475569; --text-muted: #64748b;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,.08); --shadow-hover: 0 8px 32px rgba(0,0,0,.12);
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    
    /* === HEADER STYLES === */
    .header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 88px;
      background: rgba(255,255,255,.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }
    .logo { display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none; }
    .logo-img { height: 64px; width: auto; object-fit: contain; }
    .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: -.3px; color: var(--text); }
    .logo-subtitle { font-size: .65rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: -4px; }
    .nav { display: flex; gap: 4px; }
    .nav-btn {
      position: relative; padding: 10px 18px; border: none; background: transparent;
      color: var(--text-secondary); font-size: .88rem; font-weight: 500;
      border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
    }
    .nav-btn:hover { background: var(--primary-glow); color: var(--primary); }
    .nav-btn.active { background: var(--primary-glow); color: var(--primary); font-weight: 600; }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: -1px; left: 50%;
      transform: translateX(-50%); width: 60%; height: 2px;
      background: var(--primary); border-radius: 1px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px rgba(5,150,105,.4); }
    .status-text { font-size: .75rem; color: var(--accent); font-weight: 600; }
    
    /* === PAGE STYLES === */
    .main { padding: 2rem; max-width: 1440px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
    .page-desc { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }
    
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-size: .85rem; font-weight: 600; cursor: pointer; transition: var(--transition); pointer-events: auto; }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,.2); }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
    .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: var(--transition); box-shadow: var(--shadow); margin-bottom: 1.5rem; }
    .card:hover { border-color: rgba(37,99,235,.3); box-shadow: var(--shadow-hover); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; margin: 0.25rem 0; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    
    .chart-container { position: relative; height: 300px; margin: 1rem 0; }
    
    .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead { background: var(--card-hover); }
    th { text-align: left; padding: 12px 16px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.72rem; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--card-hover); }
    
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.4; }
    
    .toast-container { position: fixed; top: 100px; right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 0.82rem; box-shadow: var(--shadow-hover); animation: slideIn 0.3s ease; max-width: 320px; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    
    .text-green { color: var(--accent); }
    .text-yellow { color: var(--warning); }
    .text-red { color: var(--danger); }
    .text-blue { color: var(--primary); }
    .text-muted { color: var(--text-muted); }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 0.5rem; }
    .wrap { flex-wrap: wrap; }
    
    @media (max-width: 1024px) {
      .header { padding: 0 1rem; height: 80px; }
      .logo-img { height: 52px; }
      .nav { gap: 0; flex-wrap: wrap; }
      .nav-btn { padding: 8px 12px; font-size: 0.78rem; }
      .logo-text { font-size: 1.2rem; }
      .logo-subtitle { display: none; }
      .main { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" id="logoBtn">
    <img src="https://i.ibb.co/p6GCfY1x/Screenshot-2026-05-30-at-17-06-41.png" alt="Drafts Dashboard Logo" class="logo-img" loading="lazy">
  </div>
  <nav class="nav">
    <a href="index.html" class="nav-btn">Dashboard</a>
    <a href="projects.html" class="nav-btn">Projects</a>
    <a href="payments.html" class="nav-btn">Payments</a>
    <a href="clients.html" class="nav-btn">Clients</a>
    <a href="reports.html" class="nav-btn active">Reports</a>
    <a href="performance.html" class="nav-btn">Performance</a>
    <a href="finance.html" class="nav-btn">Finance</a>
    <a href="employees.html" class="nav-btn">Employees</a>
  </nav>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-text">Online</span>
  </div>
</header>

<div class="toast-container" id="toastContainer"></div>

<main class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Reports & Analytics</h1>
      <p class="page-desc">Generate insights, exports, and financial summaries</p>
    </div>
    <div class="flex gap-1 wrap">
      <button class="btn btn-outline" id="exportCsvBtn">📥 Export CSV</button>
      <button class="btn btn-primary" id="generateReportBtn">📊 Generate Report</button>
    </div>
  </div>

  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date Range</label>
        <select class="form-select" id="reportRange">
          <option value="30">Last 30 Days</option>
          <option value="90">Last 90 Days</option>
          <option value="180">Last 6 Months</option>
          <option value="365">Last Year</option>
          <option value="custom">Custom Range</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Report Type</label>
        <select class="form-select" id="reportType">
          <option value="revenue">💰 Revenue Summary</option>
          <option value="projects">📁 Project Performance</option>
          <option value="clients">👥 Client Activity</option>
          <option value="employees">👤 Employee Referrals</option>
          <option value="payments">💳 Payment History</option>
        </select>
      </div>
    </div>
    <div id="customRange" style="display:none" class="form-row">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input class="form-input" type="date" id="startDate" />
      </div>
      <div class="form-group">
        <label class="form-label">End Date</label>
        <input class="form-input" type="date" id="endDate" />
      </div>
    </div>
    
    <!-- Employee Filter (appears for employee reports) -->
    <div id="employeeFilterGroup" style="display:none; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border)">
      <div class="form-group">
        <label class="form-label">Filter by Employee</label>
        <select class="form-select" id="employeeFilter">
          <option value="all">All Employees</option>
        </select>
      </div>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value" id="statRevenue">UGX 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Projects</div>
      <div class="stat-value" id="statProjects">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Payments</div>
      <div class="stat-value" id="statPayments">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg. Value</div>
      <div class="stat-value" id="statAvgValue">UGX 0</div>
    </div>
  </div>

  <div class="card" id="chartCard" style="display:none">
    <h3 style="font-size:1rem; font-weight:600; margin-bottom:1rem">📈 Trend</h3>
    <div class="chart-container">
      <canvas id="revenueChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3 id="tableTitle" style="font-size:1rem; font-weight:600; margin-bottom:1rem">Results</h3>
    <div class="table-wrapper">
      <table>
        <thead id="tableHead">
          <!-- Dynamic headers -->
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📊</div><p>Click "Generate Report" to view data.</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  (function() {
    'use strict';
    
    // === CONFIG ===
    const SUPABASE_URL = 'https://hnbzerhoqqsmzqxcbnxv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuYnplcmhvcXFzbXpxeGNibnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg1MjksImV4cCI6MjA5NDYyNDUyOX0.a4rM51DQGih9SXMr71PREngZ_pT6dJFgv_fG9j5jAGc';
    const USD_RATE = 0.00027;
    
    let chart = null, isGen = false, employeesCache = [];

    document.addEventListener('DOMContentLoaded', async function() {
      if (!window.supabase) {
        showToast('Database SDK failed to load', 'error');
        return;
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // === UTILS ===
      function formatUGX(n) { if (!n) return 'UGX 0'; return 'UGX ' + Number(n).toLocaleString(); }
      function formatUSD(n) { if (!n) return '$0.00'; return '$' + (n * USD_RATE).toFixed(2); }
      
      function showToast(msg, type = 'success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type === 'error' ? 'error' : 'success'}`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }
      
      function renderTable(headers, rows) {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
        
        if (!rows || rows.length === 0) {
          tbody.innerHTML = `<tr><td colspan="${headers.length}"><div class="empty-state"><div class="empty-icon">📭</div><p>No data found for selected filters.</p></div></td></tr>`;
          return;
        }
        
        tbody.innerHTML = rows.map(row => 
          '<tr>' + Object.values(row).map(v => `<td>${v}</td>`).join('') + '</tr>'
        ).join('');
      }

      function drawChart(labels, values, type) {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        
        if (chart) chart.destroy();
        
        const colors = {
          revenue: 'rgba(37, 99, 235, 0.8)',
          projects: 'rgba(5, 150, 105, 0.8)',
          clients: 'rgba(217, 119, 6, 0.8)',
          employees: 'rgba(100, 116, 139, 0.8)',
          payments: 'rgba(100, 116, 139, 0.8)'
        };
        
        chart = new Chart(ctx, {
          type: type === 'projects' ? 'doughnut' : 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: type === 'projects' ? 'Projects' : 'Amount (UGX)',
              data: values,
              backgroundColor: colors[type] || colors.revenue,
              borderColor: colors[type]?.replace('0.8', '1') || colors.revenue.replace('0.8', '1'),
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: type !== 'projects' } },
            scales: type === 'projects' ? {} : {
              y: { 
                beginAtZero: true, 
                ticks: { callback: v => 'UGX ' + (v/1000000).toFixed(1) + 'M' } 
              }
            }
          }
        });
      }

      // === LOAD EMPLOYEES FOR FILTER ===
      async function loadEmployeesFilter() {
        try {
          const { data, error } = await supabase.from('employees').select('id, name').eq('status', 'active').order('name');
          if (error) throw error;
          employeesCache = data || [];
          
          const sel = document.getElementById('employeeFilter');
          sel.innerHTML = '<option value="all">All Employees</option>' + 
            employeesCache.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
        } catch (err) {
          console.warn('Failed to load employees for filter:', err);
        }
      }

      // === GENERATE REPORT ===
      async function generateReport() {
        if (isGen) return;
        isGen = true;
        const btn = document.getElementById('generateReportBtn');
        const originalText = btn.textContent;
        btn.textContent = 'Generating...';
        btn.disabled = true;

        try {
          const type = document.getElementById('reportType').value;
          const range = document.getElementById('reportRange').value;
          const employeeId = document.getElementById('employeeFilter').value;
          
          let startDate, endDate;
          if (range === 'custom') {
            startDate = document.getElementById('startDate').value;
            endDate = document.getElementById('endDate').value;
            if (!startDate || !endDate) throw new Error('Please select both start and end dates');
          } else {
            const dates = getDateRange(parseInt(range));
            startDate = dates.start;
            endDate = dates.end;
          }

          // Show loading state
          document.getElementById('statsGrid').style.display = 'grid';
          document.getElementById('chartCard').style.display = 'block';
          document.getElementById('tableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading data...</p></div></td></tr>`;

          // Fetch base data
          const { data: projects, error: projErr } = await supabase.from('projects').select('*');
          if (projErr) throw projErr;
          
          const { data: payments, error: payErr } = await supabase.from('payments').select('*');
          if (payErr) throw payErr;
          
          const paid = (payments || []).filter(p => 
            p.status === 'paid' && 
            p.payment_date >= startDate && 
            p.payment_date <= endDate
          );
          
          const rev = paid.reduce((s, p) => s + (p.amount || 0), 0);
          
          let results = [], chartData = { labels: [], values: [] }, stats = { revenue: 0, projects: 0, payments: 0, avgValue: 0 };
          
          stats.revenue = rev;
          stats.projects = (projects || []).filter(p => p.status === 'active').length;
          stats.payments = payments?.length || 0;
          stats.avgValue = stats.projects > 0 ? stats.revenue / stats.projects : 0;
          
          document.getElementById('statRevenue').textContent = formatUGX(stats.revenue);
          document.getElementById('statProjects').textContent = stats.projects;
          document.getElementById('statPayments').textContent = stats.payments;
          document.getElementById('statAvgValue').textContent = formatUGX(stats.avgValue);

          if (type === 'revenue') {
            // Revenue by month
            const monthly = {};
            paid.forEach(p => {
              const month = p.payment_date.substring(0, 7); // YYYY-MM
              monthly[month] = (monthly[month] || 0) + p.amount;
            });
            
            chartData.labels = Object.keys(monthly).map(m => new Date(m + '-01').toLocaleDateString('en-US', { month: 'short', year: 'numeric' }));
            chartData.values = Object.values(monthly);
            
            results = Object.entries(monthly).map(([month, amount]) => ({
              period: new Date(month + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
              amount: formatUGX(amount),
              usd: formatUSD(amount)
            }));
            
            document.getElementById('tableTitle').textContent = 'Monthly Revenue';
            renderTable(['Period', 'Amount (UGX)', 'Amount (USD)'], results);
            
          } else if (type === 'projects') {
            // Filter by employee referral if selected
            let filteredProjects = projects || [];
            if (employeeId !== 'all') {
              filteredProjects = filteredProjects.filter(p => p.referred_by_id === employeeId);
            }
            
            chartData.labels = ['Active', 'Completed', 'On Hold'];
            chartData.values = [
              filteredProjects.filter(p => p.status === 'active').length,
              filteredProjects.filter(p => p.status === 'completed').length,
              filteredProjects.filter(p => p.status === 'on-hold').length
            ];
            
            results = filteredProjects.map(p => ({
              name: p.name || 'Untitled',
              client: p.client || '—',
              rate: formatUGX(p.monthly_rate),
              duration: `${p.plan_months || 1} mo`,
              status: p.status || 'unknown'
            }));
            
            document.getElementById('tableTitle').textContent = employeeId !== 'all' ? `Projects Referred by ${employeesCache.find(e => e.id === employeeId)?.name || 'Employee'}` : 'Project Performance';
            renderTable(['Project', 'Client', 'Monthly Rate', 'Duration', 'Status'], results);
            
          } else if (type === 'clients') {
            // Client stats via JS merging (text-based client field)
            const clientMap = {};
            (projects || []).forEach(p => {
              const client = p.client || 'Unknown';
              if (!clientMap[client]) clientMap[client] = { name: client, count: 0, revenue: 0 };
              clientMap[client].count++;
            });
            
            paid.forEach(py => {
              const proj = projects?.find(p => p.id === py.project_id);
              if (proj?.client && clientMap[proj.client]) {
                clientMap[proj.client].revenue += py.amount || 0;
              }
            });
            
            const clientData = Object.values(clientMap).sort((a, b) => b.revenue - a.revenue);
            
            chartData.labels = clientData.slice(0, 10).map(c => c.name);
            chartData.values = clientData.slice(0, 10).map(c => c.revenue);
            
            results = clientData.map(c => ({
              name: c.name,
              projects: c.count,
              revenue: formatUGX(c.revenue),
              usd: formatUSD(c.revenue)
            }));
            
            document.getElementById('tableTitle').textContent = 'Client Revenue';
            renderTable(['Client', 'Projects', 'Revenue (UGX)', 'Revenue (USD)'], results);
            
          } else if (type === 'employees') {
            // Employee referral report
            document.getElementById('tableTitle').textContent = 'Employee Referral Performance';
            
            // Show employee filter
            document.getElementById('employeeFilterGroup').style.display = 'block';
            await loadEmployeesFilter();
            
            // Filter earnings by employee if selected
            let earnings = await supabase.from('employee_earnings').select('*, projects(name, client)').eq('type', 'commission');
            if (employeeId !== 'all') {
              earnings = earnings.eq('employee_id', employeeId);
            }
            const { data: empEarnings, error: earnErr } = await earnings;
            if (earnErr) throw earnErr;
            
            // Group by employee
            const empMap = {};
            (empEarnings || []).forEach(e => {
              const empId = e.employee_id;
              if (!empMap[empId]) {
                const emp = employeesCache.find(em => em.id === empId);
                empMap[empId] = { 
                  name: emp?.name || 'Unknown', 
                  count: 0, 
                  total: 0,
                  projects: new Set()
                };
              }
              empMap[empId].count++;
              empMap[empId].total += e.amount || 0;
              if (e.project_id) empMap[empId].projects.add(e.project_id);
            });
            
            const empData = Object.values(empMap).sort((a, b) => b.total - a.total);
            
            chartData.labels = empData.slice(0, 10).map(e => e.name);
            chartData.values = empData.slice(0, 10).map(e => e.total);
            
            results = empData.map(e => ({
              employee: e.name,
              referrals: e.projects.size,
              commissions: e.count,
              earned: formatUGX(e.total),
              usd: formatUSD(e.total)
            }));
            
            renderTable(['Employee', 'Projects Referred', 'Commissions', 'Earned (UGX)', 'Earned (USD)'], results);
            
          } else if (type === 'payments') {
            // Payment history
            results = paid.map(p => {
              const proj = projects?.find(pr => pr.id === p.project_id);
              return {
                date: new Date(p.payment_date).toLocaleDateString(),
                project: proj?.name || 'Unknown',
                client: proj?.client || '—',
                amount: formatUGX(p.amount),
                status: p.status
              };
            });
            
            document.getElementById('tableTitle').textContent = 'Payment History';
            renderTable(['Date', 'Project', 'Client', 'Amount', 'Status'], results);
          }
          
          // Render chart
          drawChart(chartData.labels, chartData.values, type);
          
          showToast('Report generated successfully!');
          
        } catch (err) {
          console.error('Report error:', err);
          showToast('Failed to generate report: ' + err.message, 'error');
          document.getElementById('statsGrid').style.display = 'none';
          document.getElementById('chartCard').style.display = 'none';
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
          isGen = false;
        }
      }

      // === EXPORT CSV ===
      function exportCSV() {
        const headers = Array.from(document.querySelectorAll('#tableHead th')).map(th => th.textContent);
        const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => 
          Array.from(tr.querySelectorAll('td')).map(td => td.textContent)
        ).filter(row => row.length > 1 && !row[0].includes('No data'));
        
        if (rows.length === 0) {
          showToast('No data to export', 'error');
          return;
        }
        
        const csv = [headers, ...rows].map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('CSV exported successfully!');
      }

      // === DATE RANGE HELPER ===
      function getDateRange(days) {
        const end = new Date();
        const start = new Date();
        start.setDate(start.getDate() - days);
        return { 
          start: start.toISOString().split('T')[0], 
          end: end.toISOString().split('T')[0] 
        };
      }

      // === EVENT LISTENERS ===
      document.getElementById('logoBtn').addEventListener('click', () => window.location.href = 'index.html');
      
      // Toggle custom date range
      document.getElementById('reportRange').addEventListener('change', function() {
        document.getElementById('customRange').style.display = this.value === 'custom' ? 'grid' : 'none';
      });
      
      // Toggle employee filter visibility
      document.getElementById('reportType').addEventListener('change', function() {
        document.getElementById('employeeFilterGroup').style.display = this.value === 'employees' ? 'block' : 'none';
        if (this.value === 'employees') loadEmployeesFilter();
      });
      
      // Generate report button
      document.getElementById('generateReportBtn').addEventListener('click', generateReport);
      
      // Export CSV button
      document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
      
      // Auto-generate on load with default filters
      setTimeout(generateReport, 300);
    });
  })();
</script>
</body>
</html>
