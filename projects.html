<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Drafts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg: #f8fafc; --surface: #ffffff; --card: #ffffff; --card-hover: #f1f5f9; --border: #e2e8f0; --primary: #2563eb; --primary-glow: rgba(37,99,235,.1); --accent: #059669; --accent-glow: rgba(5,150,105,.1); --warning: #d97706; --danger: #dc2626; --text: #1e293b; --text-secondary: #475569; --text-muted: #64748b; --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 24px rgba(0,0,0,.08); --shadow-hover: 0 8px 32px rgba(0,0,0,.12); --transition: .2s cubic-bezier(.4,0,.2,1); }
    * { margin:0; padding:0; box-sizing:border-box; } body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 88px; background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none; } .logo-img { height: 64px; width: auto; } .logo-text { font-size: 1.6rem; font-weight: 800; color: var(--text); } .logo-subtitle { font-size: .65rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: -4px; }
    .nav { display: flex; gap: 4px; } .nav-btn { position: relative; padding: 10px 18px; border: none; background: transparent; color: var(--text-secondary); font-size: .88rem; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); } .nav-btn:hover { background: var(--primary-glow); color: var(--primary); } .nav-btn.active { background: var(--primary-glow); color: var(--primary); font-weight: 600; } .nav-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 60%; height: 2px; background: var(--primary); }
    .header-right { display: flex; align-items: center; gap: 12px; } .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; } .status-text { font-size: .75rem; color: var(--accent); font-weight: 600; }
    .main { padding: 2rem; max-width: 1440px; margin: 0 auto; } .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; } .page-title { font-size: 1.5rem; font-weight: 700; color: var(--text); } .page-desc { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-size: .85rem; font-weight: 600; cursor: pointer; transition: var(--transition); } .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,.2); } .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); } .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); } .btn-sm { padding: 6px 14px; font-size: .78rem; } .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; } .badge-green { background: var(--accent-glow); color: var(--accent); } .badge-yellow { background: rgba(217,119,6,.12); color: var(--warning); } .badge-red { background: rgba(220,38,38,.12); color: var(--danger); } .badge-blue { background: var(--primary-glow); color: var(--primary); } .badge-gray { background: rgba(100,116,139,.12); color: var(--text-muted); } .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .price-main { font-weight: 700; font-size: .88rem; } .price-sub { font-size: .7rem; color: var(--text-muted); margin-left: 4px; }
    .progress-track { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; } .progress-fill { height: 100%; background: var(--accent); transition: width .6s ease; } .progress-info { display: flex; justify-content: space-between; font-size: .75rem; color: var(--text-muted); margin-top: 4px; }
    .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); } table { width: 100%; border-collapse: collapse; font-size: .85rem; } thead { background: var(--card-hover); } th { text-align: left; padding: 12px 16px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: .72rem; border-bottom: 1px solid var(--border); } td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; } tr:last-child td { border-bottom: none; } tbody tr:hover { background: var(--card-hover); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); } .empty-icon { font-size: 3rem; margin-bottom: .75rem; opacity: .4; }
    .toast-container { position: fixed; top: 100px; right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 8px; } .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 16px; font-size: .82rem; box-shadow: var(--shadow-hover); animation: slideIn .3s ease; max-width: 320px; } @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 200; place-items: center; } .modal-overlay.open { display: grid; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 90%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-hover); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); } .modal-title { font-size: 1.1rem; font-weight: 700; } .modal-close { width: 32px; height: 32px; display: grid; place-items: center; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 6px; } .modal-body { padding: 1.5rem; } .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--surface); }
    .form-group { margin-bottom: 1rem; } .form-label { display: block; font-size: .78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; } .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: .85rem; } .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); } .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; } @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; } .gap-1 { gap: .5rem; } .wrap { flex-wrap: wrap; } .text-red { color: var(--danger); } .text-blue { color: var(--primary); } .text-green { color: var(--accent); } .text-muted { color: var(--text-muted); }
    @media (max-width: 1024px) { .header { padding: 0 1rem; height: 80px; } .logo-img { height: 52px; } .nav { gap: 0; flex-wrap: wrap; } .nav-btn { padding: 8px 12px; } .main { padding: 1rem; } }
  </style>
</head>
<body>
<header class="header">
  <div class="logo" id="logoBtn"><img src="https://i.ibb.co/p6GCfY1x/Screenshot-2026-05-30-at-17-06-41.png" alt="Logo" class="logo-img"></div>
  <nav class="nav">
    <a href="index.html" class="nav-btn">Dashboard</a>
    <a href="projects.html" class="nav-btn active">Projects</a>
    <a href="payments.html" class="nav-btn">Payments</a>
    <a href="clients.html" class="nav-btn">Clients</a>
    <a href="reports.html" class="nav-btn">Reports</a>
    <a href="performance.html" class="nav-btn">Performance</a>
    <a href="finance.html" class="nav-btn">Finance</a>
    <a href="employees.html" class="nav-btn">Employees</a>
  </nav>
  <div class="header-right"><div class="status-dot"></div><span class="status-text">Online</span></div>
</header>

<div class="toast-container" id="toastContainer"></div>

<main class="main">
  <div class="page-header">
    <div><h1 class="page-title">Project Tracking</h1><p class="page-desc">Monitor all active and completed projects</p></div>
    <div class="flex gap-1 wrap">
      <select class="form-select" style="width:auto" id="projectFilter"><option value="all">All Status</option><option value="active">Active</option><option value="completed">Completed</option><option value="on-hold">On Hold</option></select>
      <button class="btn btn-primary" id="newProjectBtn">＋ New Project</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table><thead><tr><th>Project</th><th>Client</th><th>Rate</th><th>Plan</th><th>Referred By</th><th>Progress</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="projectsTable"><tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📁</div><p>Loading...</p></div></td></tr></tbody></table>
  </div>
</main>

<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title" id="modalTitle">New Project</h3><button class="modal-close" id="closeModal">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="projId" />
      <div class="form-group"><label class="form-label">Project Name *</label><input class="form-input" id="projName" placeholder="e.g. Inventory System" /></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Client *</label><input class="form-input" id="projClient" placeholder="Company / Person" /></div>
        <div class="form-group"><label class="form-label">Monthly Rate (UGX)</label><input class="form-input" id="projRate" type="number" placeholder="500,000" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Plan Duration</label><select class="form-select" id="projPlan"><option value="1">1 Month</option><option value="3">3 Months</option><option value="6">6 Months</option><option value="8">8 Months</option><option value="12">1 Year</option><option value="24">2 Years</option></select></div>
        <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" id="projStart" type="date" /></div>
      </div>
      <div class="form-group"><label class="form-label">Referred By (Optional)</label><select class="form-select" id="projEmployee"><option value="">None</option></select></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="projStatus"><option value="active">Active</option><option value="completed">Completed</option><option value="on-hold">On Hold</option></select></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="projNotes"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" id="cancelModal">Cancel</button><button class="btn btn-primary" id="saveProject">Save Project</button></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const SUPABASE_URL = 'https://hnbzerhoqqsmzqxcbnxv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuYnplcmhvcXFzbXpxeGNibnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg1MjksImV4cCI6MjA5NDYyNDUyOX0.a4rM51DQGih9SXMr71PREngZ_pT6dJFgv_fG9j5jAGc';
  let supabase, employeesCache = [], isSaving = false;

  document.addEventListener('DOMContentLoaded', async () => {
    if (!window.supabase) return alert('DB SDK missing');
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadEmployees();
    await loadProjects();

    document.getElementById('logoBtn').onclick = () => location.href = 'index.html';
    document.getElementById('newProjectBtn').onclick = () => openModal('New Project');
    document.getElementById('closeModal').onclick = document.getElementById('cancelModal').onclick = () => closeModal();
    document.querySelectorAll('.modal-overlay').forEach(o => o.onclick = e => { if(e.target===o) closeModal(); });
    document.getElementById('projectFilter').onchange = loadProjects;
    document.getElementById('projectsTable').onclick = e => {
      const btn = e.target.closest('.edit-btn'); if(btn) editProject(btn.dataset.id);
      const ext = e.target.closest('.extend-btn'); if(ext) toast('Extension logic here', 'info');
    };
    document.getElementById('saveProject').onclick = saveProject;
    document.getElementById('projStart').value = new Date().toISOString().split('T')[0];
  });

  function fmtUGX(n) { return 'UGX ' + Number(n||0).toLocaleString(); }
  function fmtUSD(n) { return '$' + (n*0.00027).toFixed(2); }
  function toast(m,t='success') { const c=document.getElementById('toastContainer'); const d=document.createElement('div'); d.className='toast'; d.textContent=m; d.style.borderLeftColor=t==='error'?'var(--danger)':'var(--accent)'; c.appendChild(d); setTimeout(()=>d.remove(),3000); }
  function openModal(title) { document.getElementById('projId').value=''; document.getElementById('projName').value=''; document.getElementById('projClient').value=''; document.getElementById('projRate').value=''; document.getElementById('projPlan').value='1'; document.getElementById('projStart').value=new Date().toISOString().split('T')[0]; document.getElementById('projStatus').value='active'; document.getElementById('projNotes').value=''; document.getElementById('projEmployee').value=''; document.getElementById('modalTitle').textContent=title; document.getElementById('projectModal').classList.add('open'); }
  function closeModal() { document.getElementById('projectModal').classList.remove('open'); }

  async function loadEmployees() {
    const { data } = await supabase.from('employees').select('id, name, status').eq('status','active');
    employeesCache = data || [];
    const sel = document.getElementById('projEmployee');
    sel.innerHTML = '<option value="">None</option>' + employeesCache.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  }

  async function loadProjects() {
    const filter = document.getElementById('projectFilter').value;
    let q = supabase.from('projects').select('*').order('created_at', { ascending: false });
    if (filter!=='all') q = q.eq('status', filter);
    const { data, error } = await q;
    const tb = document.getElementById('projectsTable');
    if (error || !data?.length) { tb.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📁</div><p>No projects found</p></div></td></tr>`; return; }
    
    tb.innerHTML = data.map(p => {
      const start = new Date(p.start_date), end = new Date(start); end.setMonth(end.getMonth() + (p.plan_months||1));
      const elapsed = Math.max(0, Math.floor((new Date()-start)/(1000*60*60*24*30)));
      const pct = Math.min(100, Math.max(0, Math.round((elapsed/(p.plan_months||1))*100)));
      const emp = employeesCache.find(e => e.id === p.referred_by_id);
      return `<tr>
        <td><strong>${p.name}</strong></td>
        <td>${p.client}</td>
        <td><strong>${fmtUGX(p.monthly_rate)}</strong></td>
        <td><span class="badge badge-gray">${p.plan_months} mo</span></td>
        <td>${emp ? `<span class="text-blue fw-700">${emp.name}</span>` : '<span class="text-muted">—</span>'}</td>
        <td style="min-width:120px"><div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${pct>90?'var(--danger)':pct>60?'var(--warning)':'var(--accent)'}"></div></div><div class="progress-info"><span>${pct}%</span><span>${elapsed}/${p.plan_months} mo</span></div></td>
        <td><span class="badge ${p.status==='active'?'badge-green':p.status==='completed'?'badge-blue':'badge-yellow'}"><span class="badge-dot"></span>${p.status}</span></td>
        <td class="flex gap-1"><button class="btn btn-sm btn-outline edit-btn" data-id="${p.id}">Edit</button><button class="btn btn-sm btn-outline extend-btn" data-id="${p.id}">Extend</button></td>
      </tr>`;
    }).join('');
  }

  async function editProject(id) {
    const { data } = await supabase.from('projects').select('*').eq('id',id).single();
    if(!data) return toast('Project not found','error');
    openModal('Edit Project');
    document.getElementById('projId').value = data.id;
    document.getElementById('projName').value = data.name;
    document.getElementById('projClient').value = data.client;
    document.getElementById('projRate').value = data.monthly_rate;
    document.getElementById('projPlan').value = data.plan_months;
    document.getElementById('projStart').value = data.start_date;
    document.getElementById('projStatus').value = data.status;
    document.getElementById('projNotes').value = data.notes||'';
    document.getElementById('projEmployee').value = data.referred_by_id || '';
  }

  async function saveProject() {
    if(isSaving) return; isSaving=true; const btn=document.getElementById('saveProject'); btn.textContent='Saving...'; btn.disabled=true;
    try {
      const id = document.getElementById('projId').value || 'p-'+Date.now()+'-'+Math.random().toString(36).substr(2,6);
      const data = {
        id, name: document.getElementById('projName').value.trim(), client: document.getElementById('projClient').value.trim(),
        monthly_rate: parseInt(document.getElementById('projRate').value)||0, plan_months: parseInt(document.getElementById('projPlan').value)||1,
        start_date: document.getElementById('projStart').value, status: document.getElementById('projStatus').value,
        notes: document.getElementById('projNotes').value.trim(),
        referred_by_id: document.getElementById('projEmployee').value || null,
        created_at: new Date().toISOString()
      };
      if(!data.name||!data.client) throw new Error('Name & Client required');
      const { error } = await supabase.from('projects').upsert(data, { onConflict: 'id' });
      if(error) throw error;
      toast('Saved!'); closeModal(); await loadProjects();
    } catch(e) { toast('Error: '+e.message, 'error'); }
    finally { btn.textContent='Save Project'; btn.disabled=false; isSaving=false; }
  }
})();
</script>
</body>
</html>
